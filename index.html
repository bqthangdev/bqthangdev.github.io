<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTools</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">⚙️ DevTools</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="string-length">
          <span class="nav-icon">📏</span>
          <span class="nav-label">String Length</span>
        </button>
        <button class="nav-item" data-page="image-to-base64">
          <span class="nav-icon">🖼️</span>
          <span class="nav-label">Image to Base64</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Chuyển giao diện">
          <span class="theme-icon" id="theme-icon">☀️</span>
          <span class="nav-label" id="theme-label">Light mode</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="content">

      <!-- Page: String Length -->
      <section class="page active" id="page-string-length">
        <div class="page-header">
          <h1>String Length Checker</h1>
          <p class="page-desc">Paste your string below to check its length.</p>
        </div>
        <div class="card">
          <div class="stats-row" id="sl-stats">
            <div class="stat-box">
              <span class="stat-value" id="sl-total">0</span>
              <span class="stat-label">Total characters</span>
            </div>
            <div class="stat-box">
              <span class="stat-value" id="sl-no-spaces">0</span>
              <span class="stat-label">Without spaces</span>
            </div>
            <div class="stat-box">
              <span class="stat-value" id="sl-words">0</span>
              <span class="stat-label">Words</span>
            </div>
            <div class="stat-box">
              <span class="stat-value" id="sl-lines">0</span>
              <span class="stat-label">Lines</span>
            </div>
          </div>
          <textarea
            id="sl-input"
            class="textarea"
            placeholder="Paste your string here..."
            spellcheck="false"
          ></textarea>
          <div class="action-row">
            <button class="btn btn-secondary" id="sl-clear">Clear</button>
            <button class="btn btn-primary" id="sl-copy">Copy length</button>
          </div>
        </div>
      </section>

      <!-- Page: Image to Base64 -->
      <section class="page" id="page-image-to-base64">
        <div class="page-header">
          <h1>Image to Base64</h1>
          <p class="page-desc">Upload one or more images to convert them to Base64.</p>
        </div>
        <div class="card">
          <label class="drop-zone" id="ib-dropzone">
            <input type="file" id="ib-input" accept="image/*" multiple hidden />
            <div class="drop-zone-inner">
              <span class="drop-icon">📂</span>
              <span class="drop-text">Click or drag & drop images here</span>
              <span class="drop-hint">Supports PNG, JPG, GIF, WebP, SVG…</span>
            </div>
          </label>
        </div>

        <div id="ib-results"></div>
      </section>

    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
